# =============================================================================
# VOCASTREAM Docker Compose - Production Ready
# =============================================================================
version: '3.8'

services:
  vocastream:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocastream
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://your-domain.com
      - KAGGLE_URL=${KAGGLE_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vocastream-network

networks:
  vocastream-network:
    driver: bridge